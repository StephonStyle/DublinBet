<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>DublinBet</title>
<style>
:root {
  --bg: #0d0d1a;
  --card: #16162a;
  --card2: #1e1e3a;
  --primary: #00e676;
  --primary-dim: rgba(0,230,118,0.15);
  --gold: #ffd740;
  --gold-dim: rgba(255,215,64,0.15);
  --red: #ff5252;
  --red-dim: rgba(255,82,82,0.12);
  --blue: #448aff;
  --blue-dim: rgba(68,138,255,0.12);
  --text: #f0f0f0;
  --text2: #9090b0;
  --border: rgba(255,255,255,0.06);
  --radius: 14px;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  padding-bottom: 76px; overflow-x: hidden;
}
.footer { position:fixed; bottom:52px; left:0; right:0; text-align:center; font-size:10px; color:var(--text2); padding:6px; background:var(--bg); z-index:99; border-top:1px solid var(--border); }
.header {
  position:sticky; top:0; z-index:100;
  background:linear-gradient(135deg,#0d0d1a 0%,#1a0a2e 100%);
  padding:10px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.header h1 {
  font-size:22px; font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--primary));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  flex:1;
}
.user-btn {
  display:flex; align-items:center; gap:6px;
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:4px 14px 4px 8px;
  color:var(--text); font-size:13px; cursor:pointer; white-space:nowrap;
}
.user-btn .avatar { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:var(--primary-dim); color:var(--primary); }
.refresh-btn { background:none; border:none; color:var(--text2); font-size:16px; cursor:pointer; padding:4px; line-height:1; }
.refresh-btn:hover { color:var(--primary); }
.settings-btn { background:none; border:none; color:var(--text2); font-size:18px; cursor:pointer; padding:4px; line-height:1; }
.cam-btn { background:none; border:none; color:var(--text2); font-size:16px; cursor:pointer; padding:4px; line-height:1; }
.cam-btn:hover { color:var(--primary); }

.tabs {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:linear-gradient(0deg,#0d0d1a 0%,rgba(13,13,26,0.98) 100%);
  border-top:1px solid var(--border);
  display:flex; padding:4px 0 env(safe-area-inset-bottom);
}
.tab {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:6px 0 4px; cursor:pointer; color:var(--text2);
  font-size:10px; transition:color .2s; border:none; background:none;
}
.tab.active { color:var(--primary); }
.tab .icon { font-size:20px; line-height:1.2; }

.content { display:none; padding:12px 14px; }
.content.active { display:block; }

.match-card {
  background:var(--card); border-radius:var(--radius); padding:14px 16px;
  margin-bottom:12px; border:1px solid var(--border);
}
.match-header {
  display:flex; align-items:center; gap:6px; margin-bottom:10px;
}
.match-date { font-size:12px; font-weight:700; white-space:nowrap; }
.match-time-center { font-size:12px; font-weight:700; text-align:center; flex:1; min-width:44px; letter-spacing:0; }
.league-badge { font-size:10px; font-weight:600; padding:2px 10px; border-radius:10px; }
.league-badge.英超 { background:var(--primary-dim); color:var(--primary); }
.league-badge.欧冠 { background:var(--blue-dim); color:var(--blue); }
.league-badge.世界杯 { background:var(--gold-dim); color:var(--gold); }
.league-badge.西甲 { background:rgba(255,100,50,0.2); color:#ff6432; }
.league-badge.中超 { background:rgba(255,200,50,0.2); color:#ffc832; }
.league-badge.欧联 { background:rgba(0,200,150,0.2); color:#00c896; }
.league-badge.欧协联 { background:rgba(100,100,255,0.2); color:#6666ff; }
.match-time { font-size:12px; color:var(--text2); flex:1; text-align:right; font-weight:500; }
.match-status { font-size:10px; font-weight:600; padding:2px 8px; border-radius:8px; background:var(--card2); }
.match-status.待预测 { color:var(--blue); background:var(--blue-dim); }
.match-status.进行中 { color:var(--red); background:var(--red-dim); animation: pulse 1.5s ease-in-out infinite; }
.match-status.已预测 { color:var(--gold); background:var(--gold-dim); }
.match-status.待结算 { color:var(--primary); background:var(--primary-dim); }
.match-status.已结算 { color:var(--text2); }
.match-status.预测截止 { color:var(--red); background:var(--red-dim); }
.match-status.流局 { color:var(--red); background:var(--red-dim); }
.match-teams { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
.team { display:flex; align-items:center; gap:8px; flex:1; }
.team.away { flex-direction:row-reverse; }
.team .name { font-size:12px; font-weight:600; }
.team .logo { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; background:var(--card2); }
.match-score { font-size:22px; font-weight:800; color:var(--text); text-align:center; min-width:50px; }
.match-score .vs { font-size:14px; font-weight:400; color:var(--text2); }
.match-score-input { display:flex; align-items:center; gap:4px; justify-content:center; }
.match-score-input input { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:18px; font-weight:700; text-align:center; outline:none; }
.match-score-input input:focus { border-color:var(--primary); }
.btn { padding:6px 16px; border-radius:8px; border:none; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .2s; }
.btn:active { opacity:.7; }
.btn-primary { background:var(--primary); color:#000; }
.btn-gold { background:var(--gold); color:#000; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-outline.btn-small { padding:3px 6px; font-size:10px; }
.btn-outline.active { background:var(--primary); border-color:var(--primary); color:#000; }
.btn-small { padding:4px 12px; font-size:11px; }
.stake-btns { display:flex; gap:5px; }
.stake-btn { padding:6px 8px; border-radius:8px; background:var(--card2); border:1px solid var(--border); color:var(--text); font-size:12px; font-weight:600; cursor:pointer; text-align:center; min-width:34px; transition:all .2s; user-select:none; }
.stake-btn:active { transform:scale(.95); }
.stake-btn.active { background:var(--primary); border-color:var(--primary); color:#000; }
.stake-row { display:flex; align-items:center; gap:4px; margin-top:6px; flex-wrap:nowrap; }
.stake-row .stake-label { font-size:11px; color:var(--text2); white-space:nowrap; }
.stake-row .stake-btns { display:flex; gap:4px; flex-shrink:1; min-width:0; }
.stake-row .btn { flex-shrink:0; }
.summary-card { background:linear-gradient(135deg,var(--card),var(--card2)); border-radius:var(--radius); padding:18px; margin-bottom:16px; border:1px solid var(--border); text-align:center; }
.summary-card .big-num { font-size:36px; font-weight:800; margin:6px 0; }
.summary-card .big-num.positive { color:var(--primary); }
.summary-card .big-num.negative { color:var(--red); }
.summary-card .big-num.zero { color:var(--text2); }
.summary-row { display:flex; justify-content:space-around; gap:12px; margin-top:12px; }
.summary-item { text-align:center; }
.summary-item .label { font-size:11px; color:var(--text2); }
.summary-item .value { font-size:18px; font-weight:700; margin-top:2px; }
.bill-item { background:var(--card); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; border:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.bill-item .match-info { flex:1; }
.bill-item .match-info .teams { font-size:13px; font-weight:600; }
.bill-item .match-info .detail { font-size:11px; color:var(--text2); margin-top:2px; }
.bill-amount { font-size:16px; font-weight:700; text-align:right; }
.bill-amount.positive { color:var(--primary); }
.bill-amount.negative { color:var(--red); }
.rank-card { background:var(--card); border-radius:var(--radius); padding:12px 16px; margin-bottom:8px; border:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.rank-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; }
.rank-num.gold { background:var(--gold); color:#000; }
.rank-num.silver { background:#a0a0b0; color:#000; }
.rank-num.bronze { background:#cd7f32; color:#fff; }
.rank-num.normal { background:var(--card2); color:var(--text2); }
.rank-info { flex:1; }
.rank-info .name { font-size:14px; font-weight:600; }
.rank-info .stats { font-size:11px; color:var(--text2); margin-top:2px; }
.rank-score { text-align:right; }
.rank-score .pts { font-size:20px; font-weight:800; color:var(--gold); }
.rank-score .label { font-size:10px; color:var(--text2); }
.modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:var(--card); border-radius:var(--radius); padding:24px; width:100%; max-width:380px; border:1px solid var(--border); max-height:80vh; overflow-y:auto; }
.modal h2 { font-size:18px; margin-bottom:16px; text-align:center; }
.modal-close { float:right; background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; padding:4px; }
.user-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.user-option { display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 8px; border-radius:12px; border:2px solid transparent; background:var(--card2); cursor:pointer; }
.user-option.selected { border-color:var(--primary); background:var(--primary-dim); }
.user-option .avatar-big { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
.user-option .un { font-size:13px; font-weight:600; }
.admin-panel { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:14px; border:1px solid var(--gold-dim); display:none; }
.admin-panel.show { display:block; }
.admin-panel h3 { font-size:14px; color:var(--gold); margin-bottom:12px; }
.admin-panel label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; }
.admin-panel input, .admin-panel select { width:100%; min-width:0; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:13px; margin-bottom:10px; outline:none; }
.admin-panel input:focus { border-color:var(--gold); }
.admin-row { display:flex; gap:8px; }
.admin-row input { flex:1; }
.stake-option input:checked+span { background:var(--gold)!important; color:#000!important; border-color:var(--gold)!important; }
.debt-summary { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.debt-box { background:var(--card); border-radius:var(--radius); padding:14px; text-align:center; border:1px solid var(--border); }
.debt-box .label { font-size:11px; color:var(--text2); }
.debt-box .value { font-size:22px; font-weight:800; margin-top:4px; }
.debt-item { background:var(--card); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; border:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.debt-item .arrow { color:var(--text2); font-size:16px; }
.debt-amount { font-size:15px; font-weight:700; margin-left:auto; }
.debt-amount.positive { color:var(--primary); }
.debt-amount.negative { color:var(--red); }
.empty-state { text-align:center; padding:40px 20px; color:var(--text2); }
.empty-state .icon { font-size:48px; margin-bottom:12px; opacity:.5; }
.empty-state p { font-size:13px; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--card2); color:var(--text); padding:10px 20px; border-radius:10px; font-size:13px; z-index:300; border:1px solid var(--border); box-shadow:var(--shadow); animation: toastIn .3s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.admin-toggle { display:flex; align-items:center; justify-content:center; gap:6px; padding:8px; margin-top:4px; border-top:1px solid var(--border); }
.admin-toggle label { font-size:11px; color:var(--text2); cursor:pointer; }
.switch { position:relative; display:inline-block; width:36px; height:20px; cursor:pointer; }
.switch input { display:none; }
.switch .slider { position:absolute; inset:0; background:var(--card2); border-radius:20px; transition:.3s; }
.switch .slider::before { content:''; position:absolute; left:2px; top:2px; width:16px; height:16px; border-radius:50%; background:var(--text2); transition:.3s; }
.switch input:checked+.slider { background:var(--gold-dim); }
.switch input:checked+.slider::before { background:var(--gold); transform:translateX(16px); }
.loading { text-align:center; padding:60px 20px; color:var(--text2); }
.loading .spin { display:inline-block; width:32px; height:32px; border:3px solid var(--card2); border-top-color:var(--primary); border-radius:50%; animation: spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.match-card,.bill-item,.rank-card,.debt-item { animation:fadeIn .3s ease; }
@media (min-width:600px) { .content { max-width:600px; margin:0 auto; } .user-grid { grid-template-columns:1fr 1fr 1fr; } .pred-grid { grid-template-columns:1fr 1fr 1fr 1fr!important; } }
</style>
</head>

async function sbGet(table, opts='') {
  const r = await Promise.race([
    fetch(SB_URL+'/rest/v1/'+table+opts, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Accept': 'application/json' }
    }),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))
  ]);
  if (!r.ok) throw new Error(table+' GET failed: '+r.status);
  return r.json();
}

async function sbPost(table, data) {
  const r = await Promise.race([
    fetch(SB_URL+'/rest/v1/'+table, {
      method: 'POST', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(data)
    }),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))
  ]);
  if (!r.ok && r.status!==201) { const te=await r.text(); throw new Error(table+' POST failed: '+r.status+' '+te); }
  return r;
}

async function sbPatch(table, data) {

    }),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))
  ]);
  if (!r.ok && r.status!==204) throw new Error('PATCH failed: '+r.status);
  return r;
}

function compressImage(file,maxSize){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const c=document.createElement('canvas');let w=img.width,h=img.height;
        if(w>h){if(w>maxSize){h*=maxSize/w;w=maxSize;}}else{if(h>maxSize){w*=maxSize/h;h=maxSize;}}
        c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',0.7));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ======================== SETTLEMENT ========================
async function settleMatch(m){
  if(m.home_score==null||m.home_score==null||m.away_score==null||m.settled) return;
  const ps=getPreds(m.id);
  const predictors=ps.map(p=>p.user_name);
  const wnrs=ps.filter(p=>p.home_score===m.home_score&&p.away_score===m.away_score).map(p=>p.user_name);
  const losrs=predictors.filter(n=>!wnrs.includes(n));
  let s;
  const defStake=m.stake||5;
  if(wnrs.length===0){
    s={type:'void',winners:[],losers:losrs,amountPerLoser:0,amountPerWinner:0,totalPot:0};
  }else{
    const cur=m.settlement?(typeof m.settlement==='string'?JSON.parse(m.settlement):m.settlement):{};
    const stakes=cur.stakes||{};
    const pot=losrs.reduce((sum,n)=>sum+(stakes[n]||defStake),0);
    const totalWs=wnrs.reduce((sum,n)=>sum+(stakes[n]||defStake),0);
    const indv={};
    let alloc=0;
    wnrs.forEach((n,i)=>{
      if(i===wnrs.length-1){indv[n]=pot-alloc;}
      else{const r=(stakes[n]||defStake)/totalWs;indv[n]=Math.round(pot*r);alloc+=indv[n];}
    });
    losrs.forEach(n=>{indv[n]=-(stakes[n]||defStake);});
    s={type:'settled',winners:wnrs,losers:losrs,amountPerWinner:0,amountPerLoser:defStake,totalPot:pot,remainder:0,individual:indv};
  }
  await ft(SB_URL+'/rest/v1/matches?id=eq.'+m.id,{
    method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({settled:true,settlement:JSON.stringify(s)})
  });
  const det=s.type==='void'?`${m.home} ${m.home_score}-${m.away_score} ${m.away} · 无人猜中，抱歉`:`${m.home} ${m.home_score}-${m.away_score} ${m.away} · 总总积分${s.totalPot} · 赢家按比例分配`;
  await ft(SB_URL+'/rest/v1/settlement_logs',{
    method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({match_id:m.id,detail:det})
  });
  m.settled=true;m.settlement=s;
}

async function settleAll(){
  for(const m of M) if(m.home_score!=null&&m.away_score!=null&&!m.settled) {
    try{await settleMatch(m);}catch(e){console.error('结算失败',m.id,e);}
  }
}

function gs(m){
  if(m.settled) return{label:m.settlement?.type==='void'?'流局':'已结算',cls:m.settlement?.type==='void'?'流局':'已结算'};
  if(m.home_score!=null) return{label:'待结算',cls:'待结算'};
  if(m.settlement?.live_home!==undefined) return{label:'🔴 进行中',cls:'待结算'};
  const u=cu();if(u&&getPred(m.id,u)) return{label:'已预测',cls:'已预测'};
  if(Date.now()>m.date-PREDICT_CUTOFF) return{label:'预测截止',cls:'预测截止'};
  return{label:'待预测',cls:'待预测'};
}

async function submitPred(mid){
  const u=cu(); if(!u){showToast('请先选择身份');showUserSelect();return;}
  const m=M.find(x=>x.id===mid); if(!m||m.settled||m.home_score!=null){showToast('比赛已结束');return;}
  if(Date.now()>m.date-PREDICT_CUTOFF){showToast('预测已截止（比赛开始前1分钟停止预测）');return;}
  const h=parseInt(document.getElementById('ph_'+mid)?.value);
  const a=parseInt(document.getElementById('pa_'+mid)?.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){showToast('请输入有效比分');return;}
  const skBtn=document.querySelector('#stk_'+mid+' .stake-btn.active');
  if(!skBtn){showToast('请选择分数');return;}
  const cs=parseInt(skBtn.dataset.stake);
  const existing=getPred(mid,u);
  try{
    if(existing){
      await ft(SB_URL+'/rest/v1/predictions?match_id=eq.'+mid+'&user_name=eq.'+encodeURIComponent(u),{
        method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({home_score:h,away_score:a})
      });
      existing.home_score=h;existing.away_score=a;
    }else{
      await sbPost('predictions',{match_id:mid,user_name:u,home_score:h,away_score:a});
      P.push({match_id:mid,user_name:u,home_score:h,away_score:a});
    }
  }catch(e){
    if(!existing&&e.message.includes('23505')){showToast('你已经提交过预测了！');return;}
    showToast(existing?'修改失败':'提交失败');return;
  }
  const mx=M.find(x=>x.id===mid);
  if(mx){
    const cur=mx.settlement?(typeof mx.settlement==='string'?JSON.parse(mx.settlement):mx.settlement):{};
    if(!cur.stakes) cur.stakes={};
    cur.stakes[u]=cs;
    try{await ft(SB_URL+"/rest/v1/matches?id=eq."+mid,{method:"PATCH",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({settlement:JSON.stringify(cur)})});}catch(e){}
    mx.settlement=cur;
  }
  renderAll();showToast(`✅ 已${existing?'修':''}提交 ${m.home} ${h}-${a} ${m.away}`);
}
function selectStake(mid,v){
  const btns=document.querySelectorAll('#stk_'+mid+' .stake-btn');
  btns.forEach(b=>b.classList.remove('active'));
  const t=document.querySelector('#stk_'+mid+' [data-stake="'+v+'"]');
  if(t) t.classList.add('active');
}

async function enterResult(mid){
  if(!isAdmin) return;
  const m=M.find(x=>x.id===mid); if(!m) return;
  const h=parseInt(document.getElementById('rh_'+mid)?.value);
  const a=parseInt(document.getElementById('ra_'+mid)?.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){showToast('请输入有效比分');return;}
  await ft(SB_URL+'/rest/v1/matches?id=eq.'+mid,{
    method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({home_score:h,away_score:a})
  });
  m.home_score=h;m.away_score=a;
  await settleMatch(m);renderAll();showToast(`✅ ${m.home} ${h}-${a} ${m.away} 已录入并结算`);
  // Refresh logs
  L = await sbGet('settlement_logs','?order=created_at.desc');
}

async function adminEditResult(mid){
  if(!isAdmin) return;
  const m=M.find(x=>x.id===mid); if(!m) return;
  const h=parseInt(document.getElementById('rh_'+mid)?.value);
  const a=parseInt(document.getElementById('ra_'+mid)?.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){showToast('请输入有效比分');return;}
  await ft(SB_URL+'/rest/v1/matches?id=eq.'+mid,{
    method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({settled:false,settlement:null})
  });
  m.settled=false;m.settlement=null;m.home_score=h;m.away_score=a;
  await settleMatch(m);
  renderAll();showToast(`✅ ${m.home} ${h}-${a} ${m.away} 已修改并重新结算`);
  L = await sbGet('settlement_logs','?order=created_at.desc');
}

async function updateLiveScore(mid){
  if(!isAdmin) return;
  const m=M.find(x=>x.id===mid); if(!m) return;
  const h=parseInt(document.getElementById('lvh_'+mid)?.value);
  const a=parseInt(document.getElementById('lva_'+mid)?.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){showToast('请输入有效比分');return;}
  let s=m.settlement?(typeof m.settlement==='string'?JSON.parse(m.settlement):m.settlement):{};
  s.live_home=h;s.live_away=a;
  await ft(SB_URL+'/rest/v1/matches?id=eq.'+mid,{
    method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({settlement:JSON.stringify(s)})
  });
  m.settlement=s;renderAll();
  showToast('🔴 实时比分已更新: '+ts(m.home)+' '+h+'-'+a+' '+ts(m.away));
}

async function addMatch(){
  const lg=document.getElementById('addLeague').value;
  const h=document.getElementById('addHome').value.trim();
  const a=document.getElementById('addAway').value.trim();
  const dv=document.getElementById('addDate').value;
if(!h||!a){showToast('请输入球队名称');return;}
  if(!dv){showToast('请选择比赛时间');return;}
  const id='m_'+Date.now();
  const nm={id,league:lg,home:h,away:a,stake:5,date:new Date(dv).getTime(),home_score:null,away_score:null,settled:false,settlement:null};
  await sbPost('matches',nm);
  M.push(nm);
  document.getElementById('addHome').value='';document.getElementById('addAway').value='';document.getElementById('addDate').value='';
  renderAll();showToast(`✅ 已添加 ${h} vs ${a}`);
}

// ======================== UI ========================
function showUserSelect(){
  const g=document.getElementById('userGrid');
  g.innerHTML=USERS.map((n,i)=>{const s=curUser===i;const av=avatars[n];
    const avHtml=av?'<img src="'+av+'" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">':'<div class="avatar-big" style="background:'+COLORS[i]+'22;color:'+COLORS[i]+';">'+ac(n)+'</div>';
    return`<div class="user-option${s?' selected':''}" onclick="selectUser(${i})">${avHtml}<span class="un">${n}</span>${s?'<span style="font-size:10px;color:var(--primary);">✓ 当前</span>':''}</div>`;}).join('');
  document.getElementById('userModal').classList.add('show');
}

async function getUserPin(un){
  try{const d=await sbGet('user_pins','?user_name=eq.'+encodeURIComponent(un)+'&select=pin');return d&&d.length?d[0].pin:null;}
  catch(e){return null;}
}
async function setUserPin(un,pin){
  try{await sbPost('user_pins',{user_name:un,pin:pin});}catch(e){
    await ft(SB_URL+'/rest/v1/user_pins?user_name=eq.'+encodeURIComponent(un),{
      method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({pin:pin})
    });
  }
}
async function selectUser(id){
  const nm=USERS[id];
  const ep=await getUserPin(nm);
  if(ep){
    const ip=prompt('请输入 '+nm+' 的密码:');
    if(ip===null)return;
    if(ip!==ep){showToast('密码错误');return;}
  }else{
    const np=prompt('首次使用，请为 '+nm+' 设置4位数密码:');
    if(np===null||!/^\d{4}$/.test(np)){showToast('密码必须为4位数字');return;}
    await setUserPin(nm,np);
  }
  curUser=id;localStorage.setItem('zuipao_user',id);
  updateUI();document.getElementById('userModal').classList.remove('show');renderAll();
  showToast('你好，'+USERS[id]);
}

function updateUI(){
  const u=cu();const avEl=document.getElementById('userAvatar');const nEl=document.getElementById('userName');
  nEl.textContent=u||'选择用户';
  if(u&&avatars[u]){avEl.innerHTML='<img src="'+avatars[u]+'" style="width:26px;height:26px;border-radius:50%;object-fit:cover;">';avEl.style.background='transparent';}
  else{avEl.textContent=u?ac(u):'?';avEl.style.background=u?COLORS[USERS.indexOf(u)]+'22':'';avEl.style.color=u?COLORS[USERS.indexOf(u)]:'';}
}

function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

function toggleAdmin(){
  if(!isAdmin && cu()!=='Stephon'){showToast('只有管理员可以操作');return;}
  isAdmin=!isAdmin;
  document.getElementById('adminSwitch').checked=isAdmin;
  document.getElementById('adminPanel').classList.toggle('show',isAdmin);
  renderAll();
}

// ======================== REAL-TIME POLL ========================
let pollTimer = null;

function saveInputs(){
  const saved={};
  document.querySelectorAll('.match-score-input input').forEach(el=>{saved[el.id]=el.value;});
  document.querySelectorAll('[id^="rh_"],[id^="ra_"],[id^="lvh_"],[id^="lva_"]').forEach(el=>{saved[el.id]=el.value;});
  return saved;
}

function restoreInputs(saved){
  if(!saved) return;
  Object.keys(saved).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value=saved[id];
  });
}

let _lastHash = '';
function startPoll(){
  pollTimer = setInterval(async ()=>{
    try{
      const mRaw = await sbGet('matches','?order=date');
      M = (mRaw||[]).map(m => { if(typeof m.settlement === 'string') try{ m.settlement=JSON.parse(m.settlement); }catch(e){} return m; });
      P = await sbGet('predictions','?order=id');
      L = await sbGet('settlement_logs','?order=created_at.desc');
      await loadAvatars();
      await settleAll();
      if(!loaded) loaded=true;
      const h = JSON.stringify(M)+JSON.stringify(P)+JSON.stringify(L);
      if(h === _lastHash) return;
      _lastHash = h;
      const saved=saveInputs();
      renderAll();
      restoreInputs(saved);
    }catch(e){
      if(!loaded) document.getElementById('matchList').innerHTML='<div class="empty-state"><div class="icon">⚠️</div><p style="color:var(--red);font-size:12px;">加载失败: '+e.message+'</p></div>';
    }
  }, 8000);
}

// ======================== INIT ========================
function init(){
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.content,.tab').forEach(e=>e.classList.remove('active'));
    document.getElementById('tab'+t.dataset.tab).classList.add('active');t.classList.add('active');renderAll();
  }));
  document.querySelectorAll('#leagueFilters .btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#leagueFilters .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderMatches();
  }));
  document.querySelectorAll('#pastLeagueFilters .btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#pastLeagueFilters .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderPast();
  }));
  document.getElementById('userBtn').addEventListener('click',showUserSelect);
  document.querySelector('#userModal .modal-close').addEventListener('click',()=>document.getElementById('userModal').classList.remove('show'));
  document.getElementById('userModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
  document.getElementById('adminBtn').addEventListener('click',toggleAdmin);
  document.getElementById('adminSwitch').addEventListener('change',toggleAdmin);
  document.getElementById('addMatchBtn').addEventListener('click',addMatch);
  document.getElementById('camBtn').addEventListener('click',()=>{if(!cu()){showToast('请先选择身份');return;}document.getElementById('avatarUpload').click();});
  document.getElementById('avatarUpload').addEventListener('change',async function(){const f=this.files?.[0];if(f){await uploadAvatar(f);}this.value='';});
  document.querySelectorAll('#stakeOptions .stake-option').forEach(el=>el.addEventListener('click',function(){
    document.querySelectorAll('#stakeOptions span').forEach(s=>{s.style.background='';s.style.color='';s.style.borderColor='';});
    this.querySelector('span').style.background='var(--gold)';this.querySelector('span').style.color='#000';this.querySelector('span').style.borderColor='var(--gold)';
  }));
  updateUI();
  loadData().then(() => {
    startPoll();
  });
}

document.addEventListener('DOMContentLoaded',init);
</script>
